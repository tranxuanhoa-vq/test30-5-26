<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Mini - Dashboard Giáo viên (Tiến độ học sinh)</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { max-width: 1400px; margin: 0 auto; padding: 20px; background: #f5f7fb; }
        h1, h2 { color: #1e3c72; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; }
        .file-group { margin: 10px 0; flex: 1; }
        input, button, select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #1e3c72; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0f2b4f; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; font-size: 14px; overflow-x: auto; display: block; }
        th, td { border: 1px solid #ccc; padding: 8px 10px; text-align: center; white-space: nowrap; }
        th { background: #e2e8f0; position: sticky; top: 0; }
        .total-row { background: #fef9e3; font-weight: bold; }
        .badge { background: #e2e8f0; padding: 4px 12px; border-radius: 20px; display: inline-block; margin: 5px; }
        .warning { background: #fee2e2; border-left: 6px solid #dc2626; padding: 12px; margin: 15px 0; }
        textarea { width: 100%; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .nav-tab { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ccc; flex-wrap: wrap; }
        .nav-tab button { background: #e2e8f0; color: #1e3c72; margin-right: 5px; padding: 8px 16px; }
        .nav-tab button.active { background: #1e3c72; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .week-checkboxes { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .week-checkboxes label { display: inline-flex; align-items: center; gap: 5px; background: #f0f0f0; padding: 5px 10px; border-radius: 20px; }
        canvas { max-width: 100%; margin-top: 20px; }
        .progress-bar { width: 100%; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: #1e3c72; height: 20px; width: 0%; }
    </style>
</head>
<body>
<h1>📊 LMS Mini – Dashboard Giáo viên (Tiến độ học sinh)</h1>

<div class="nav-tab">
    <button data-tab="stats" class="active">📈 Thống kê điểm</button>
    <button data-tab="history">📜 Lịch sử & Cảnh báo bỏ bài</button>
    <button data-tab="progress">📋 Tiến độ học sinh</button>
    <button data-tab="compare2">📊 So sánh 2 tuần</button>
    <button data-tab="multiweek">📈 Xu hướng nhiều tuần</button>
    <button data-tab="search">🔍 Tra cứu điểm HS</button>
    <button data-tab="export">📄 Xuất báo cáo PDF</button>
</div>

<!-- Tab 1: Thống kê điểm -->
<div id="tab-stats" class="tab-content active">
    <div class="card">
        <div class="flex-row">
            <div class="file-group"><label><strong>1. Upload file Excel</strong></label><input type="file" id="resultFile" accept=".xlsx, .xls, .csv"></div>
            <div class="file-group"><label><strong>2. Hoặc link Google Sheet (CSV)</strong></label><input type="text" id="gsheetUrl" placeholder="https://.../pub?output=csv"><button id="loadGsheetBtn">📥 Đọc</button></div>
            <div class="file-group"><label><strong>3. File danh sách lớp (tùy chọn)</strong></label><input type="file" id="rosterFile" accept=".xlsx, .xls, .csv"></div>
        </div>
        <div class="flex-row">
            <div class="file-group"><label>Tuần (lưu lịch sử)</label><input type="text" id="weekInput" placeholder="VD: 2026-W22"><button id="saveHistoryBtn">💾 Lưu tuần này</button></div>
            <div class="file-group"><button id="generateBtn" style="margin-top:24px;">📈 Tạo bảng thống kê</button></div>
        </div>
        <div id="status" class="badge">Chưa có dữ liệu</div>
    </div>
    <div id="statsTableContainer"></div>
</div>

<!-- Tab 2: Lịch sử & bỏ bài -->
<div id="tab-history" class="tab-content">
    <div class="card">
        <h2>📜 Các tuần đã lưu</h2>
        <div id="historyList"></div>
        <button id="clearHistoryBtn">🗑️ Xóa toàn bộ lịch sử</button>
        <h2>⚠️ Học sinh bỏ bài 2 tuần liên tiếp</h2>
        <div id="riskStudents"></div>
    </div>
</div>

<!-- Tab 3: Tiến độ học sinh (mới) -->
<div id="tab-progress" class="tab-content">
    <div class="card">
        <h2>📋 Tiến độ làm bài của học sinh</h2>
        <div class="flex-row">
            <div class="file-group">
                <label>Chọn lớp (nếu có danh sách lớp)</label>
                <select id="classFilterProgress"><option value="all">Tất cả lớp</option></select>
            </div>
            <div class="file-group">
                <label>Lọc theo trạng thái</label>
                <select id="statusFilterProgress">
                    <option value="all">Tất cả</option>
                    <option value="good">Đã làm ≥80%</option>
                    <option value="medium">Đã làm 50%-80%</option>
                    <option value="bad">Đã làm <50%</option>
                </select>
            </div>
            <button id="refreshProgressBtn">🔄 Cập nhật</button>
            <button id="exportProgressCsv">📎 Xuất CSV tiến độ</button>
        </div>
        <div id="progressTableContainer" style="overflow-x: auto;"></div>
    </div>
</div>

<!-- Tab 4: So sánh 2 tuần -->
<div id="tab-compare2" class="tab-content">
    <div class="card">
        <h2>So sánh 2 tuần bất kỳ</h2>
        <div class="flex-row">
            <div class="file-group"><label>Tuần thứ nhất</label><select id="week1Select"></select></div>
            <div class="file-group"><label>Tuần thứ hai</label><select id="week2Select"></select></div>
            <button id="compareWeeksBtn">🔍 So sánh</button>
        </div>
        <div id="reportTableContainer"></div>
        <div style="margin-top:20px;"><button id="exportReportCSV">📎 Xuất CSV</button> <button id="generateMessagesBtn">✉️ Sinh lời nhắn PHHS</button></div>
        <div id="parentMessages"></div>
    </div>
</div>

<!-- Tab 5: Xu hướng nhiều tuần -->
<div id="tab-multiweek" class="tab-content">
    <div class="card">
        <h2>📈 Xu hướng điểm số qua nhiều tuần</h2>
        <div class="flex-row">
            <div class="file-group"><label>Chọn học sinh</label><select id="studentSelectMulti"></select></div>
            <div class="file-group"><label>Hoặc chọn lớp</label><select id="classSelectMulti"><option value="">-- Chọn lớp --</option></select></div>
            <button id="loadTrendBtn">📊 Xem xu hướng</button>
        </div>
        <div id="trendControls" style="margin:15px 0;">
            <label>Chọn các tuần muốn xem (bỏ chọn/tích chọn):</label>
            <div id="weeksCheckboxes" class="week-checkboxes"></div>
            <button id="selectAllWeeks">Chọn tất cả</button> <button id="deselectAllWeeks">Bỏ chọn tất cả</button>
        </div>
        <div id="trendChartContainer"><canvas id="trendChart" width="800" height="400"></canvas></div>
        <div id="trendTableContainer" style="overflow-x: auto; margin-top:20px;"></div>
        <button id="exportMultiCsv">📎 Xuất báo cáo nhiều tuần (CSV)</button>
    </div>
</div>

<!-- Tab 6: Tra cứu -->
<div id="tab-search" class="tab-content">
    <div class="card">
        <h2>🔍 Tra cứu điểm cá nhân</h2>
        <input type="text" id="searchName" placeholder="Nhập tên học sinh" style="width:70%"><button id="searchScoreBtn">Tra cứu</button>
        <div id="searchResult"></div>
    </div>
</div>

<!-- Tab 7: Xuất PDF -->
<div id="tab-export" class="tab-content">
    <div class="card">
        <h2>📄 Xuất báo cáo thống kê hiện tại thành PDF</h2>
        <button id="exportPdfBtn">Xuất PDF</button>
    </div>
</div>

<script>
    // ---------- Khởi tạo biến ----------
    let resultData = [];       // mảng {lop, ten, score}
    let classRoster = new Map(); // Map<lop, Set<ten>>
    let currentStatsHtml = "";
    const STORAGE_KEY = "examHistoryDetailed"; // { week: { "Lớp_Tên": điểm } }
    let trendChart = null;

    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // ---------- Đọc file Excel ----------
    function readFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { defval: "", header: 1 });
                if (!rows.length) reject("Empty sheet");
                const headers = rows[0];
                const jsonRows = [];
                for (let i = 1; i < rows.length; i++) {
                    let obj = {};
                    headers.forEach((h, idx) => { obj[h] = rows[i][idx] !== undefined ? rows[i][idx] : ""; });
                    jsonRows.push(obj);
                }
                resolve(jsonRows);
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    function parseCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        if (lines.length < 2) return [];
        const headers = lines[0].split(',').map(h => h.trim());
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = lines[i].split(',');
            let obj = {};
            headers.forEach((h, idx) => { obj[h] = values[idx] ? values[idx].trim() : ""; });
            rows.push(obj);
        }
        return rows;
    }

    function parseScore(value) {
        if (value === undefined || value === null) return 0;
        let str = String(value).trim();
        str = str.replace(/,/g, '.');
        let match = str.match(/[\d\.\-]+/);
        if (match) {
            let num = parseFloat(match[0]);
            return isNaN(num) ? 0 : num;
        }
        return 0;
    }

    function processResultRows(rows) {
        if (!rows.length) return [];
        const headers = Object.keys(rows[0]);
        let nameCol = headers.find(h => h === "Tên HS" || h.includes("Tên HS"));
        if (!nameCol) { console.error("Không tìm thấy cột Tên HS"); return []; }
        let scoreCol = headers.find(h => h === "Điểm");
        if (!scoreCol && headers.length > 4) scoreCol = headers[4];
        if (!scoreCol) { console.error("Không thể xác định cột điểm"); return []; }
        const timestampCol = headers.find(h => h.includes("Dấu thời gian")) || headers[0];
        rows.sort((a,b) => new Date(a[timestampCol]) - new Date(b[timestampCol]));
        const latestMap = new Map();
        for (const row of rows) {
            let fullName = (row[nameCol] || "").trim();
            if (!fullName) continue;
            let lop, ten;
            if (fullName.includes("_")) {
                const idx = fullName.indexOf("_");
                lop = fullName.substring(0, idx).trim();
                ten = fullName.substring(idx+1).trim();
            } else {
                lop = "Khách";
                ten = fullName;
            }
            const key = `${lop}_${ten}`;
            let rawScore = row[scoreCol];
            let score = parseScore(rawScore);
            if (isNaN(score)) score = 0;
            latestMap.set(key, { lop, ten, score });
        }
        return Array.from(latestMap.values());
    }

    function processRosterRows(rows) {
        const headers = rows.length ? Object.keys(rows[0]) : [];
        const classCol = headers.find(h => h === "Lớp" || h.toLowerCase() === "lop");
        const nameCol = headers.find(h => h === "Tên HS" || h === "Họ tên" || h.toLowerCase().includes("tên"));
        if (!classCol || !nameCol) throw new Error("File danh sách cần cột 'Lớp' và 'Tên HS'");
        const roster = new Map();
        for (const row of rows) {
            let lop = row[classCol]?.toString().trim();
            let ten = row[nameCol]?.toString().trim();
            if (lop && ten) {
                if (!roster.has(lop)) roster.set(lop, new Set());
                roster.get(lop).add(ten);
            }
        }
        return roster;
    }

    function getScoreRange(score) {
        if (score <= 1.0) return "≤1.0";
        if (score <= 2.0) return "1.0<2.0";
        if (score <= 3.5) return "2.0<3.5";
        if (score <= 5.0) return "3.5<5.0";
        if (score <= 6.5) return "5<6.5";
        if (score <= 8.0) return "6.5<8";
        if (score <= 9.0) return "8<9";
        return "9<10";
    }

    function generateStats() {
        if (!resultData.length) {
            document.getElementById("statsTableContainer").innerHTML = '<div class="card">⚠️ Chưa có dữ liệu kết quả.</div>';
            return;
        }
        const classScores = new Map();
        for (let item of resultData) {
            if (!classScores.has(item.lop)) classScores.set(item.lop, []);
            classScores.get(item.lop).push(item.score);
        }
        const allClasses = Array.from(classScores.keys()).sort((a,b) => {
            if (a === "Khách") return 1;
            if (b === "Khách") return -1;
            return a.localeCompare(b);
        });
        const ranges = ["≤1.0", "1.0<2.0", "2.0<3.5", "3.5<5.0", "5<6.5", "6.5<8", "8<9", "9<10"];
        let html = `<div class="card" id="statsCard"><h2>📋 THỐNG KÊ ĐIỂM THI THEO LẦN - ${getToday()}</h2>
        <table><thead><tr><th>MÔN</th><th>Lớp</th><th>Số HS</th>${ranges.map(r=>`<th>${r}<br>SL</th>`).join('')}<th>≥5</th><th>Điểm TB</th></tr>
        <tr><td colspan="3"></td>${ranges.map(()=>`<th>SL</th>`).join('')}<th>SL</th><th>%</th></tr></thead><tbody>`;
        let total = { count:0, sum:0, rangeCounts: new Array(ranges.length).fill(0), ge5:0 };
        for (let lop of allClasses) {
            let scores = classScores.get(lop) || [];
            let rangeCount = new Array(ranges.length).fill(0);
            let sum = 0;
            for (let s of scores) { sum += s; let idx = ranges.indexOf(getScoreRange(s)); if (idx!==-1) rangeCount[idx]++; }
            let n = scores.length;
            let ge5 = scores.filter(s=>s>=5).length;
            let pct = n ? ((ge5/n)*100).toFixed(2) : "0.00";
            let avg = n ? (sum/n).toFixed(2) : "0.00";
            total.count += n; total.sum += sum;
            for (let i=0;i<ranges.length;i++) total.rangeCounts[i] += rangeCount[i];
            total.ge5 += ge5;
            html += `<tr><td>Toán</td><td>${lop}</td><td>${n}</td>${rangeCount.map(c=>`<td>${c}</td>`).join('')}<td>${ge5}</td><td>${pct}%</td><td>${avg}</td></tr>`;
        }
        let totalAvg = total.count ? (total.sum/total.count).toFixed(2) : "0.00";
        let totalPct = total.count ? ((total.ge5/total.count)*100).toFixed(2) : "0.00";
        html += `<tr class="total-row"><td colspan="2"><strong>Tổng</strong></td><td><strong>${total.count}</strong></td>${total.rangeCounts.map(c=>`<td><strong>${c}</strong></td>`).join('')}<td><strong>${total.ge5}</strong></td><td><strong>${totalPct}%</strong></td><td><strong>${totalAvg}</strong></td></tr>`;
        html += `</tbody></table><div class="note">* Lớp "Khách" là học sinh không có dấu _ trong tên.</div></div>`;
        document.getElementById("statsTableContainer").innerHTML = html;
        currentStatsHtml = html;
    }

    // ---------- Lưu lịch sử (chi tiết có điểm) ----------
    function saveCurrentWeek() {
        const week = document.getElementById("weekInput").value.trim();
        if (!week) { alert("Vui lòng nhập tuần (VD: 2026-W22)"); return; }
        if (!resultData.length) { alert("Chưa có dữ liệu kết quả"); return; }
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const weekData = {};
        for (let item of resultData) {
            const key = `${item.lop}_${item.ten}`;
            weekData[key] = item.score;
        }
        history[week] = weekData;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        alert(`Đã lưu tuần ${week} với ${Object.keys(weekData).length} HS.`);
        renderHistoryTab();
        renderWeekSelects();
        renderMultiWeekCheckboxes();
        renderProgressTab(); // cập nhật tiến độ
    }

    function renderHistoryTab() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const weeks = Object.keys(history).sort();
        let html = `<ul>`;
        for (let w of weeks) {
            let count = Object.keys(history[w]).length;
            html += `<li><strong>${w}</strong>: ${count} HS đã làm (có điểm)</li>`;
        }
        html += `</ul>`;
        document.getElementById("historyList").innerHTML = html || "<p>Chưa có lịch sử.</p>";
        if (classRoster.size === 0) {
            document.getElementById("riskStudents").innerHTML = "<p>Hãy upload file danh sách lớp để theo dõi bỏ bài.</p>";
            return;
        }
        const sortedWeeks = weeks.slice(-4);
        if (sortedWeeks.length < 2) { document.getElementById("riskStudents").innerHTML = "<p>Cần ít nhất 2 tuần để phát hiện bỏ bài.</p>"; return; }
        let attendance = new Map();
        for (let w of sortedWeeks) {
            for (let student of Object.keys(history[w])) {
                if (!attendance.has(student)) attendance.set(student, new Set());
                attendance.get(student).add(w);
            }
        }
        let riskList = [];
        for (let [lop, students] of classRoster.entries()) {
            for (let ten of students) {
                const key = `${lop}_${ten}`;
                let missingCount = 0;
                for (let i = 0; i < sortedWeeks.length; i++) {
                    const w = sortedWeeks[i];
                    if (attendance.get(key)?.has(w)) missingCount = 0;
                    else missingCount++;
                    if (missingCount >= 2) {
                        riskList.push({ lop, ten, lastWeeks: sortedWeeks.slice(i-1, i+1) });
                        break;
                    }
                }
            }
        }
        if (riskList.length === 0) document.getElementById("riskStudents").innerHTML = "<div class='badge'>✅ Không có học sinh bỏ bài 2 tuần liên tiếp.</div>";
        else {
            let riskHtml = `<div class="warning">⚠️ Học sinh có nguy cơ bỏ bài:<ul>`;
            riskList.forEach(r => { riskHtml += `<li>${r.lop}_${r.ten} (vắng tuần ${r.lastWeeks.join(", ")})</li>`; });
            riskHtml += `</ul></div>`;
            document.getElementById("riskStudents").innerHTML = riskHtml;
        }
    }

    // Render danh sách tuần cho dropdown so sánh 2 tuần
    function renderWeekSelects() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const weeks = Object.keys(history).sort().reverse();
        const week1Select = document.getElementById("week1Select");
        const week2Select = document.getElementById("week2Select");
        if (!week1Select) return;
        week1Select.innerHTML = '<option value="">-- Chọn tuần --</option>';
        week2Select.innerHTML = '<option value="">-- Chọn tuần --</option>';
        weeks.forEach(w => {
            week1Select.appendChild(new Option(w, w));
            week2Select.appendChild(new Option(w, w));
        });
        if (weeks.length >= 2) {
            week1Select.value = weeks[1];
            week2Select.value = weeks[0];
        } else if (weeks.length === 1) {
            week1Select.value = weeks[0];
        }
    }

    // So sánh 2 tuần
    function compareTwoWeeks() {
        const week1 = document.getElementById("week1Select").value;
        const week2 = document.getElementById("week2Select").value;
        if (!week1 || !week2) { alert("Chọn đủ 2 tuần"); return; }
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const data1 = history[week1] || {};
        const data2 = history[week2] || {};
        const allStudents = new Set([...Object.keys(data1), ...Object.keys(data2)]);
        const report = [];
        for (let student of allStudents) {
            const score1 = data1[student] !== undefined ? data1[student] : null;
            const score2 = data2[student] !== undefined ? data2[student] : null;
            let change = null;
            if (score1 !== null && score2 !== null) change = (score2 - score1).toFixed(2);
            report.push({
                student,
                score1: score1 !== null ? score1.toFixed(2) : "Chưa làm",
                score2: score2 !== null ? score2.toFixed(2) : "Chưa làm",
                change: change !== null ? (change >= 0 ? `+${change}` : change) : "---"
            });
        }
        report.sort((a,b) => a.student.localeCompare(b.student));
        let html = `<h3>So sánh ${week1} và ${week2}</h3><table><thead><tr><th>Học sinh</th><th>${week1}</th><th>${week2}</th><th>Tiến bộ</th></tr></thead><tbody>`;
        for (let r of report) {
            let changeClass = "";
            if (r.change !== "---") changeClass = parseFloat(r.change) >= 0 ? "style='color:green'" : "style='color:red'";
            html += `<tr><td>${r.student}</td><td>${r.score1}</td><td>${r.score2}</td><td ${changeClass}>${r.change}</td></tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById("reportTableContainer").innerHTML = html;
        window.currentReport = report;
        window.week1Name = week1;
        window.week2Name = week2;
    }

    function exportReportCSV() {
        if (!window.currentReport || !window.currentReport.length) { alert("Chưa có dữ liệu so sánh"); return; }
        let csvRows = [["Học sinh", window.week1Name, window.week2Name, "Tiến bộ"]];
        for (let r of window.currentReport) {
            csvRows.push([r.student, r.score1, r.score2, r.change]);
        }
        const csvContent = csvRows.map(row => row.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", `baocao_${window.week1Name}_${window.week2Name}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function generateParentMessages() {
        if (!window.currentReport || !window.currentReport.length) { alert("Chưa có dữ liệu so sánh"); return; }
        let messages = "";
        for (let r of window.currentReport) {
            let [lop, ten] = r.student.split("_");
            let changeText = "";
            if (r.change !== "---") {
                let num = parseFloat(r.change);
                changeText = num >= 0 ? `tăng ${r.change} điểm` : `giảm ${Math.abs(num)} điểm`;
                changeText = `, ${changeText}`;
            }
            messages += `Kính gửi PHHS em ${ten} (lớp ${lop}),\nKết quả 2 tuần gần nhất:\n- Tuần ${window.week1Name}: ${r.score1}\n- Tuần ${window.week2Name}: ${r.score2}\nNhận xét: ${r.change !== "---" ? changeText : "chưa đủ dữ liệu để so sánh"}.\nTrân trọng.\n\n`;
        }
        const msgDiv = document.getElementById("parentMessages");
        msgDiv.innerHTML = `<textarea rows="15" style="width:100%">${messages}</textarea><p>📋 Sao chép nội dung trên để gửi Zalo/Email cho phụ huynh.</p>`;
    }

    // ---------- Tiến độ học sinh (mới) ----------
    function renderProgressTab() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const weeks = Object.keys(history).sort(); // danh sách tuần đã lưu
        if (weeks.length === 0) {
            document.getElementById("progressTableContainer").innerHTML = "<div class='card'>Chưa có dữ liệu lịch sử. Hãy lưu ít nhất một tuần.</div>";
            return;
        }
        // Tập hợp tất cả học sinh từ lịch sử và từ danh sách lớp (nếu có)
        let allStudentsSet = new Set();
        for (let w of weeks) {
            for (let student of Object.keys(history[w])) {
                allStudentsSet.add(student);
            }
        }
        // Nếu có danh sách lớp, bổ sung những học sinh chưa từng làm bài (để hiển thị đủ)
        if (classRoster.size > 0) {
            for (let [lop, students] of classRoster.entries()) {
                for (let ten of students) {
                    allStudentsSet.add(`${lop}_${ten}`);
                }
            }
        }
        const allStudents = Array.from(allStudentsSet).sort();
        // Chuẩn bị dữ liệu
        const studentData = [];
        for (let student of allStudents) {
            let [lop, ten] = student.split("_");
            let doneWeeks = [];
            let missingWeeks = [];
            for (let w of weeks) {
                if (history[w] && history[w][student] !== undefined) {
                    doneWeeks.push(w);
                } else {
                    missingWeeks.push(w);
                }
            }
            const total = weeks.length;
            const done = doneWeeks.length;
            const percent = total ? (done / total * 100).toFixed(1) : 0;
            studentData.push({ lop, ten, done, total, percent, doneWeeks, missingWeeks });
        }
        // Lọc theo lớp và trạng thái
        const classFilter = document.getElementById("classFilterProgress").value;
        const statusFilter = document.getElementById("statusFilterProgress").value;
        let filtered = studentData;
        if (classFilter !== "all") {
            filtered = filtered.filter(s => s.lop === classFilter);
        }
        if (statusFilter === "good") filtered = filtered.filter(s => s.percent >= 80);
        else if (statusFilter === "medium") filtered = filtered.filter(s => s.percent >= 50 && s.percent < 80);
        else if (statusFilter === "bad") filtered = filtered.filter(s => s.percent < 50);
        // Hiển thị bảng
        let html = `<h3>Tiến độ làm bài (tổng số tuần: ${weeks.length})</h3>
        <table><thead><tr><th>Lớp</th><th>Tên học sinh</th><th>Đã làm / Tổng</th><th>%</th><th>Tiến độ</th><th>Các tuần đã làm</th><th>Các tuần chưa làm</th></tr></thead><tbody>`;
        for (let s of filtered) {
            let progressBar = `<div class="progress-bar"><div class="progress-fill" style="width: ${s.percent}%;"></div></div>`;
            html += `<tr>
                <td>${s.lop}</td>
                <td>${s.ten}</td>
                <td>${s.done}/${s.total}</td>
                <td>${s.percent}%</td>
                <td>${progressBar}</td>
                <td style="max-width:200px; white-space:normal;">${s.doneWeeks.join(", ") || "---"}</td>
                <td style="max-width:200px; white-space:normal; color:red;">${s.missingWeeks.join(", ") || "---"}</td>
            </tr>`;
        }
        html += `</tbody></table>`;
        document.getElementById("progressTableContainer").innerHTML = html;
        // Cập nhật dropdown lọc lớp
        const classSelect = document.getElementById("classFilterProgress");
        const currentVal = classSelect.value;
        const uniqueLops = [...new Set(studentData.map(s => s.lop))].sort();
        classSelect.innerHTML = '<option value="all">Tất cả lớp</option>';
        uniqueLops.forEach(l => {
            classSelect.appendChild(new Option(l, l));
        });
        if (currentVal !== "all" && uniqueLops.includes(currentVal)) classSelect.value = currentVal;
    }

    function exportProgressCsv() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const weeks = Object.keys(history).sort();
        if (weeks.length === 0) { alert("Chưa có dữ liệu lịch sử"); return; }
        let allStudentsSet = new Set();
        for (let w of weeks) {
            for (let student of Object.keys(history[w])) allStudentsSet.add(student);
        }
        if (classRoster.size > 0) {
            for (let [lop, students] of classRoster.entries()) {
                for (let ten of students) allStudentsSet.add(`${lop}_${ten}`);
            }
        }
        const allStudents = Array.from(allStudentsSet).sort();
        const csvRows = [["Lớp", "Tên học sinh", "Đã làm", "Tổng số tuần", "Tỉ lệ %", "Các tuần đã làm", "Các tuần chưa làm"]];
        for (let student of allStudents) {
            let [lop, ten] = student.split("_");
            let doneWeeks = [];
            for (let w of weeks) {
                if (history[w] && history[w][student] !== undefined) doneWeeks.push(w);
            }
            const done = doneWeeks.length;
            const total = weeks.length;
            const percent = total ? (done/total*100).toFixed(1) : 0;
            const missing = weeks.filter(w => !doneWeeks.includes(w));
            csvRows.push([lop, ten, done, total, percent, doneWeeks.join("; "), missing.join("; ")]);
        }
        const csvContent = csvRows.map(row => row.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", `tien_do_hoc_sinh.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // ---------- Nhiều tuần (Xu hướng) ----------
    function renderMultiWeekCheckboxes() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const weeks = Object.keys(history).sort();
        const container = document.getElementById("weeksCheckboxes");
        if (!container) return;
        container.innerHTML = "";
        weeks.forEach(week => {
            const label = document.createElement("label");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = week;
            cb.checked = true;
            label.appendChild(cb);
            label.appendChild(document.createTextNode(week));
            container.appendChild(label);
        });
        const allStudentsSet = new Set();
        const allClassesSet = new Set();
        for (let week of weeks) {
            for (let student of Object.keys(history[week])) {
                allStudentsSet.add(student);
                let lop = student.split("_")[0];
                if (lop) allClassesSet.add(lop);
            }
        }
        const studentSelect = document.getElementById("studentSelectMulti");
        studentSelect.innerHTML = '<option value="">-- Chọn học sinh --</option>';
        Array.from(allStudentsSet).sort().forEach(s => {
            studentSelect.appendChild(new Option(s, s));
        });
        const classSelect = document.getElementById("classSelectMulti");
        classSelect.innerHTML = '<option value="">-- Chọn lớp --</option>';
        Array.from(allClassesSet).sort().forEach(c => {
            classSelect.appendChild(new Option(c, c));
        });
    }

    function loadTrend() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const checkboxes = document.querySelectorAll("#weeksCheckboxes input");
        const selectedWeeks = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value).sort();
        if (selectedWeeks.length === 0) { alert("Chọn ít nhất một tuần"); return; }
        const student = document.getElementById("studentSelectMulti").value;
        const className = document.getElementById("classSelectMulti").value;

        let labels = [];
        let scores = [];

        if (student) {
            for (let week of selectedWeeks) {
                let score = history[week]?.[student];
                labels.push(week);
                scores.push(score !== undefined ? score : undefined);
            }
        } else if (className) {
            for (let week of selectedWeeks) {
                let weekData = history[week] || {};
                let total = 0, count = 0;
                for (let [studentKey, score] of Object.entries(weekData)) {
                    if (studentKey.startsWith(className + "_")) {
                        total += score;
                        count++;
                    }
                }
                let avg = count > 0 ? (total / count).toFixed(2) : undefined;
                labels.push(week);
                scores.push(avg);
            }
        } else {
            alert("Vui lòng chọn học sinh hoặc lớp.");
            return;
        }

        if (trendChart) trendChart.destroy();
        const ctx = document.getElementById("trendChart").getContext("2d");
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: student ? `Điểm của ${student}` : `Điểm TB lớp ${className}`,
                    data: scores,
                    borderColor: 'rgb(30, 60, 114)',
                    backgroundColor: 'rgba(30, 60, 114, 0.1)',
                    tension: 0.1,
                    fill: false
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true, max: 10 } } }
        });

        let tableHtml = `<h3>Chi tiết điểm ${student ? student : "lớp " + className}</h3><table><thead><tr><th>Tuần</th><th>Điểm</th></tr></thead><tbody>`;
        for (let i=0; i<labels.length; i++) {
            tableHtml += `<tr><td>${labels[i]}</td><td>${scores[i] !== undefined ? scores[i] : "Chưa có"}</td></tr>`;
        }
        tableHtml += `</tbody></table>`;
        document.getElementById("trendTableContainer").innerHTML = tableHtml;
    }

    function exportMultiWeekCsv() {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const checkboxes = document.querySelectorAll("#weeksCheckboxes input");
        const selectedWeeks = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value).sort();
        if (selectedWeeks.length === 0) { alert("Chọn ít nhất một tuần"); return; }
        const allStudents = new Set();
        for (let week of selectedWeeks) {
            const weekData = history[week] || {};
            for (let student of Object.keys(weekData)) allStudents.add(student);
        }
        const studentsList = Array.from(allStudents).sort();
        const csvRows = [["Học sinh", ...selectedWeeks]];
        for (let student of studentsList) {
            let row = [student];
            for (let week of selectedWeeks) {
                let score = history[week]?.[student];
                row.push(score !== undefined ? score : "Chưa làm");
            }
            csvRows.push(row);
        }
        const csvContent = csvRows.map(row => row.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", `baocao_nhieu_tuan.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // ---------- Tra cứu ----------
    function searchStudentScore() {
        const name = document.getElementById("searchName").value.trim();
        if (!name) return;
        if (!resultData.length) { document.getElementById("searchResult").innerHTML = "<p>Chưa có dữ liệu kết quả.</p>"; return; }
        const found = resultData.filter(item => item.ten === name);
        if (found.length === 0) { document.getElementById("searchResult").innerHTML = `<p>Không tìm thấy học sinh "${name}"</p>`; return; }
        let html = `<h3>Kết quả của "${name}"</h3><ul>`;
        found.forEach(f => { html += `<li>Lớp ${f.lop}: Điểm ${f.score}</li>`; });
        html += `</ul>`;
        document.getElementById("searchResult").innerHTML = html;
    }

    async function exportToPDF() {
        if (!currentStatsHtml) { alert("Chưa có bảng thống kê."); return; }
        const element = document.getElementById("statsCard");
        if (!element) return;
        const canvas = await html2canvas(element, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('landscape', 'mm', 'a4');
        const imgWidth = 280;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
        pdf.save(`thong_ke_${getToday()}.pdf`);
    }

    // ---------- Sự kiện ----------
    let resultLoaded = false, rosterLoaded = false;
    document.getElementById("resultFile").onchange = async (e) => {
        let file = e.target.files[0];
        if (!file) return;
        document.getElementById("status").innerHTML = "Đang đọc file...";
        try {
            let rows = await readFile(file);
            resultData = processResultRows(rows);
            resultLoaded = true;
            document.getElementById("status").innerHTML = `✅ Đọc xong: ${resultData.length} học sinh (kể cả khách).`;
            if (rosterLoaded) generateStats(); else generateStats();
        } catch(err) { alert(err); }
    };
    document.getElementById("loadGsheetBtn").onclick = async () => {
        let url = document.getElementById("gsheetUrl").value.trim();
        if (!url) return alert("Nhập link CSV");
        try {
            let res = await fetch(url);
            let text = await res.text();
            let rows = parseCSV(text);
            resultData = processResultRows(rows);
            resultLoaded = true;
            document.getElementById("status").innerHTML = `✅ Đọc Google Sheet: ${resultData.length} HS.`;
            generateStats();
        } catch(e) { alert(e.message); }
    };
    document.getElementById("rosterFile").onchange = async (e) => {
        let file = e.target.files[0];
        if (!file) return;
        try {
            let rows = await readFile(file);
            classRoster = processRosterRows(rows);
            rosterLoaded = true;
            document.getElementById("status").innerHTML = `✅ Đã đọc danh sách lớp: ${classRoster.size} lớp.`;
            if (resultLoaded) generateStats();
            renderProgressTab(); // cập nhật tiến độ khi có roster
        } catch(err) { alert(err); }
    };
    document.getElementById("generateBtn").onclick = () => {
        if (!resultLoaded) alert("Hãy upload file kết quả trước.");
        else generateStats();
    };
    document.getElementById("saveHistoryBtn").onclick = saveCurrentWeek;
    document.getElementById("clearHistoryBtn").onclick = () => {
        if (confirm("Xóa toàn bộ lịch sử?")) { localStorage.removeItem(STORAGE_KEY); renderHistoryTab(); renderWeekSelects(); renderMultiWeekCheckboxes(); renderProgressTab(); }
    };
    document.getElementById("compareWeeksBtn").onclick = compareTwoWeeks;
    document.getElementById("exportReportCSV").onclick = exportReportCSV;
    document.getElementById("generateMessagesBtn").onclick = generateParentMessages;
    document.getElementById("searchScoreBtn").onclick = searchStudentScore;
    document.getElementById("exportPdfBtn").onclick = exportToPDF;
    document.getElementById("loadTrendBtn").onclick = loadTrend;
    document.getElementById("exportMultiCsv").onclick = exportMultiWeekCsv;
    document.getElementById("selectAllWeeks").onclick = () => {
        document.querySelectorAll("#weeksCheckboxes input").forEach(cb => cb.checked = true);
    };
    document.getElementById("deselectAllWeeks").onclick = () => {
        document.querySelectorAll("#weeksCheckboxes input").forEach(cb => cb.checked = false);
    };
    document.getElementById("refreshProgressBtn").onclick = () => renderProgressTab();
    document.getElementById("exportProgressCsv").onclick = exportProgressCsv;

    // Tab switching
    document.querySelectorAll(".nav-tab button").forEach(btn => {
        btn.onclick = () => {
            let id = btn.getAttribute("data-tab");
            document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
            document.getElementById(`tab-${id}`).classList.add("active");
            document.querySelectorAll(".nav-tab button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (id === "history") renderHistoryTab();
            if (id === "compare2") renderWeekSelects();
            if (id === "multiweek") { renderMultiWeekCheckboxes(); loadTrend(); }
            if (id === "progress") renderProgressTab();
        };
    });

    // Khởi tạo
    renderHistoryTab();
    renderWeekSelects();
    renderMultiWeekCheckboxes();
    renderProgressTab();
</script>
</body>
