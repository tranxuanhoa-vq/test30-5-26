<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hệ thống đề thi Toán THPT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; padding-bottom: 40px; }
        .header { background: #1e3c72; color: white; padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.4rem; text-align: center; }
        /* Desktop menu */
        .menu-desktop { background: #0f2b4f; display: flex; justify-content: center; gap: 8px; padding: 8px; flex-wrap: wrap; }
        .menu-desktop a { color: white; text-decoration: none; padding: 8px 20px; border-radius: 30px; background: #1e4668; transition: 0.2s; font-weight: bold; }
        .menu-desktop a.active, .menu-desktop a:hover { background: #f39c12; color: #1e3c72; }
        /* Mobile menu */
        .menu-mobile { display: none; background: #0f2b4f; position: relative; }
        .menu-toggle { background: #f39c12; color: #1e3c72; border: none; font-size: 1.6rem; padding: 8px 16px; width: 100%; text-align: left; font-weight: bold; cursor: pointer; }
        .menu-mobile-list { display: none; flex-direction: column; background: #1e4668; }
        .menu-mobile-list a { padding: 12px 20px; color: white; text-decoration: none; border-bottom: 1px solid #2c5a8c; }
        .menu-mobile-list a.active { background: #f39c12; color: #1e3c72; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 16px; }
        .category-title { font-size: 1.8rem; margin: 20px 0 10px; color: #1e3c72; border-left: 6px solid #f39c12; padding-left: 12px; }
        .de-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .de-card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: 0.2s; border-left: 5px solid #1e3c72; }
        .de-card h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .de-meta { color: #555; font-size: 0.85rem; margin: 6px 0; }
        .btn { display: inline-block; background: #1e3c72; color: white; padding: 6px 14px; border-radius: 24px; text-decoration: none; margin-top: 8px; font-size: 0.85rem; }
        .btn-disabled { background: #aaa; pointer-events: none; }
        .closed-card { opacity: 0.7; border-left-color: gray; }
        .future-card { border-left-color: #f39c12; }
        .note { text-align: center; margin-top: 30px; color: #666; }
        @media (max-width: 768px) {
            .menu-desktop { display: none; }
            .menu-mobile { display: block; }
            .category-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>🎓 HỆ THỐNG ĐỀ THI TOÁN THPT</h1>
</div>
<div class="menu-desktop" id="desktopMenu"></div>
<div class="menu-mobile">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>
    <div class="menu-mobile-list" id="mobileMenuList"></div>
</div>
<div class="container" id="content">
    <div style="text-align:center; padding: 40px;">Đang tải đề thi...</div>
</div>

<script>
    const categories = [
        { id: "10", name: "Toán 10" },
        { id: "11", name: "Toán 11" },
        { id: "12", name: "Toán 12" },
        { id: "ontn", name: "Ôn TN" },
        { id: "thithu", name: "Thi thử" }
    ];
    let allExams = [];
    let currentCategory = "11";

    function getToday() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    async function loadExams() {
        try {
            const res = await fetch("exams.json?v=" + Date.now());
            if (!res.ok) throw new Error("Không tải được exams.json");
            const data = await res.json();
            allExams = Array.isArray(data) ? data : [];
            renderMenus();
            renderContent(currentCategory);
        } catch (err) {
            document.getElementById("content").innerHTML = `<div style="color:red;">⚠️ Lỗi tải dữ liệu: ${err.message}</div>`;
        }
    }

    function renderMenus() {
        const desktopDiv = document.getElementById("desktopMenu");
        const mobileDiv = document.getElementById("mobileMenuList");
        let desktopHtml = "", mobileHtml = "";
        categories.forEach(cat => {
            const activeClass = (currentCategory === cat.id) ? "active" : "";
            desktopHtml += `<a href="#" data-cat="${cat.id}" class="${activeClass}">${cat.name}</a>`;
            mobileHtml += `<a href="#" data-cat="${cat.id}" class="${activeClass}">${cat.name}</a>`;
        });
        desktopDiv.innerHTML = desktopHtml;
        mobileDiv.innerHTML = mobileHtml;
        document.querySelectorAll("[data-cat]").forEach(el => {
            el.addEventListener("click", (e) => {
                e.preventDefault();
                const catId = el.getAttribute("data-cat");
                if (catId === currentCategory) return;
                currentCategory = catId;
                document.querySelectorAll("[data-cat]").forEach(a => a.classList.remove("active"));
                document.querySelectorAll(`[data-cat="${catId}"]`).forEach(a => a.classList.add("active"));
                renderContent(currentCategory);
                document.getElementById("mobileMenuList").style.display = "none";
            });
        });
    }

    function renderContent(gradeId) {
        const container = document.getElementById("content");
        const today = getToday();
        let exams = allExams.filter(ex => ex.grade === gradeId);
        if (exams.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:40px;">📭 Chưa có đề nào cho mục này.</div>`;
            return;
        }
        let openList = [], futureList = [], closedList = [];
        exams.forEach(ex => {
            if (today >= ex.open && today <= ex.close) openList.push(ex);
            else if (today < ex.open) futureList.push(ex);
            else closedList.push(ex);
        });
        let html = "";
        if (openList.length) {
            html += `<div class="category-title">🔥 Đang mở</div><div class="de-list">${renderCardList(openList, "open")}</div>`;
        }
        if (futureList.length) {
            html += `<div class="category-title">📅 Sắp mở</div><div class="de-list">${renderCardList(futureList, "future")}</div>`;
        }
        if (closedList.length) {
            html += `<div class="category-title">📚 Đã đóng</div><div class="de-list">${renderCardList(closedList, "closed")}</div>`;
        }
        if (openList.length === 0 && futureList.length === 0 && closedList.length === 0)
            html = `<div style="text-align:center; padding:40px;">📭 Không có đề phù hợp.</div>`;
        container.innerHTML = html;
    }

    function renderCardList(exams, status) {
        return exams.map(ex => {
            let extraClass = "", btnText = "✍️ Làm bài", btnDisabled = false;
            if (status === "future") { extraClass = "future-card"; btnText = "⏳ Sắp mở"; btnDisabled = true; }
            if (status === "closed") { extraClass = "closed-card"; btnText = "🔒 Đã đóng"; btnDisabled = true; }
            const btnClass = btnDisabled ? "btn btn-disabled" : "btn";
            const btnLink = btnDisabled ? "#" : ex.html;
            return `
                <div class="de-card ${extraClass}">
                    <h3>📄 ${ex.title}</h3>
                    <div class="de-meta">📅 Mở: ${ex.open} | Đóng: ${ex.close}</div>
                    <div class="de-meta">🏫 Lớp: ${ex.class || "Chung"} | Tuần: ${ex.week || ""}</div>
                    <a href="${btnLink}" class="${btnClass}" ${btnDisabled ? 'onclick="return false;"' : ''}>${btnText}</a>
                </div>
            `;
        }).join("");
    }

    document.getElementById("menuToggle")?.addEventListener("click", () => {
        const menuList = document.getElementById("mobileMenuList");
        menuList.style.display = menuList.style.display === "flex" ? "none" : "flex";
    });

    loadExams();
</script>
</body>
</html>
