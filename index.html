<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HỆ THỐNG ĐỀ THI TOÁN THPT_free</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; padding-bottom: 40px; }
        .header { background: #1e3c72; color: white; padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.4rem; text-align: center; }
        .menu-desktop { background: #0f2b4f; display: flex; justify-content: center; gap: 8px; padding: 8px; flex-wrap: wrap; }
        .menu-desktop a { color: white; text-decoration: none; padding: 8px 20px; border-radius: 30px; background: #1e4668; transition: 0.2s; font-weight: bold; cursor: pointer; }
        .menu-desktop a.active, .menu-desktop a:hover { background: #f39c12; color: #1e3c72; }
        .menu-mobile { display: none; background: #0f2b4f; position: relative; }
        .menu-toggle { background: #f39c12; color: #1e3c72; border: none; font-size: 1.6rem; padding: 8px 16px; width: 100%; text-align: left; font-weight: bold; cursor: pointer; }
        .menu-mobile-list { display: none; flex-direction: column; background: #1e4668; }
        .menu-mobile-list a { padding: 12px 20px; color: white; text-decoration: none; border-bottom: 1px solid #2c5a8c; cursor: pointer; }
        .menu-mobile-list a.active { background: #f39c12; color: #1e3c72; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 16px; }
        .category-title { font-size: 1.8rem; margin: 20px 0 10px; color: #1e3c72; border-left: 6px solid #f39c12; padding-left: 12px; }
        .de-list, .doc-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .de-card, .doc-card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: 0.2s; border-left: 5px solid #1e3c72; }
        .doc-card { border-left-color: #27ae60; }
        .btn { display: inline-block; background: #1e3c72; color: white; padding: 6px 14px; border-radius: 24px; text-decoration: none; margin-top: 8px; font-size: 0.85rem; border: none; cursor: pointer; margin-right: 8px; }
        .btn-download { background: #27ae60; }
        .btn-view { background: #f39c12; color: #1e3c72; }
        .btn-disabled { background: #aaa; pointer-events: none; }
        .closed-card { opacity: 0.7; border-left-color: gray; }
        .future-card { border-left-color: #f39c12; }
        .luot-lam { font-size: 0.8rem; color: #27ae60; margin-top: 8px; font-weight: bold; }
        .no-time-badge { display: inline-block; background: #f39c12; color: #1e3c72; border-radius: 20px; font-size: 0.7rem; padding: 2px 8px; margin-left: 8px; vertical-align: middle; }
        .doc-actions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
        @media (max-width: 768px) {
            .menu-desktop { display: none; }
            .menu-mobile { display: block; }
            .category-title { font-size: 1.5rem; }
            .btn { padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>🎓 HỆ THỐNG ĐỀ THI TOÁN THPT_free</h1>
</div>
<div class="menu-desktop" id="desktopMenu"></div>
<div class="menu-mobile">
    <button class="menu-toggle" id="menuToggle">☰ Menu</button>
    <div class="menu-mobile-list" id="mobileMenuList"></div>
</div>
<div class="container" id="content">
    <div style="text-align:center; padding: 40px;">Đang tải dữ liệu...</div>
</div>

<script>
    // ========== CẤU HÌNH ==========
    const ALL_CATEGORIES = [
        { id: "2", name: "Toán 2" },{ id: "3", name: "Toán 3" },{ id: "4", name: "Toán 4" },
        { id: "5", name: "Toán 5" },{ id: "6", name: "Toán 6" },{ id: "7", name: "Toán 7" },
        { id: "8", name: "Toán 8" },{ id: "9", name: "Toán 9" },{ id: "10", name: "Toán 10" },
        { id: "11", name: "Toán 11" },{ id: "12", name: "Toán 12" },
        { id: "ontn", name: "Ôn TN" },{ id: "thithu", name: "Thi thử" }
    ];
    let activeCategories = [];
    let allExams = [];
    let allDocs = [];
    let currentTab = "de"; // 'de' hoặc 'tailieu'

    // ========== LẤY DỮ LIỆU ==========
    function loadGradeVisibility() {
        let vis = localStorage.getItem("gradeVisibility");
        if(!vis){ let d={}; ALL_CATEGORIES.forEach(c=>d[c.id]=true); localStorage.setItem("gradeVisibility",JSON.stringify(d)); return d; }
        return JSON.parse(vis);
    }
    function filterCategories() {
        let enabled = loadGradeVisibility();
        activeCategories = ALL_CATEGORIES.filter(c => enabled[c.id] === true);
        if(activeCategories.length===0) activeCategories = [...ALL_CATEGORIES];
    }

    async function loadExams() {
        try {
            let res = await fetch("exams.json?v="+Date.now());
            if(res.ok) allExams = await res.json();
            else allExams = [];
        } catch(e) { allExams = []; }
    }
    async function loadDocs() {
        try {
            let res = await fetch("docs.json?v="+Date.now());
            if(res.ok) allDocs = await res.json();
            else allDocs = [];
        } catch(e) { allDocs = []; }
    }

    function getSubmits(fileName) {
        let submits = JSON.parse(localStorage.getItem("exam_submits")) || {};
        return submits[fileName] || 0;
    }
    function getToday() {
        let d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function getExamStatus(exam, today) {
        if(exam.timeLimited === false) return "open";
        if(today >= exam.open && today <= exam.close) return "open";
        if(today < exam.open) return "future";
        return "closed";
    }

    // ========== RENDER MENU ==========
    function renderMenus() {
        let desktopDiv = document.getElementById("desktopMenu");
        let mobileDiv = document.getElementById("mobileMenuList");
        let desktopHtml = `<a data-tab="de" class="${currentTab==='de'?'active':''}">📝 Đề thi</a>
                           <a data-tab="tailieu" class="${currentTab==='tailieu'?'active':''}">📚 Tài liệu</a>`;
        let mobileHtml = desktopHtml;
        // Thêm menu các lớp (chỉ hiển thị khi ở tab đề thi)
        activeCategories.forEach(cat => {
            desktopHtml += `<a data-cat="${cat.id}" class="${currentTab==='de' && currentCategory===cat.id ? 'active' : ''}">${cat.name}</a>`;
            mobileHtml += `<a data-cat="${cat.id}" class="${currentTab==='de' && currentCategory===cat.id ? 'active' : ''}">${cat.name}</a>`;
        });
        desktopDiv.innerHTML = desktopHtml;
        mobileDiv.innerHTML = mobileHtml;
        // Sự kiện chuyển tab
        document.querySelectorAll("[data-tab]").forEach(el => {
            el.onclick = () => {
                currentTab = el.getAttribute("data-tab");
                if(currentTab === "de") renderDeThi();
                else renderTaiLieu();
                renderMenus(); // refresh lại menu active
                if(window.innerWidth<=768) document.getElementById("mobileMenuList").style.display = "none";
            };
        });
        // Sự kiện chọn lớp
        document.querySelectorAll("[data-cat]").forEach(el => {
            el.onclick = () => {
                if(currentTab !== "de") return;
                currentCategory = el.getAttribute("data-cat");
                renderDeThi();
                renderMenus();
                if(window.innerWidth<=768) document.getElementById("mobileMenuList").style.display = "none";
            };
        });
    }

    let currentCategory = "11";

    // ========== RENDER ĐỀ THI ==========
    function renderDeThi() {
        let container = document.getElementById("content");
        let today = getToday();
        let exams = allExams.filter(ex => ex.grade === currentCategory);
        if(exams.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:40px;">📭 Chưa có đề thi cho lớp này.</div>`;
            return;
        }
        let openList=[], futureList=[], closedList=[];
        exams.forEach(ex => {
            let status = getExamStatus(ex, today);
            if(status==="open") openList.push(ex);
            else if(status==="future") futureList.push(ex);
            else closedList.push(ex);
        });
        let html = "";
        if(openList.length) html += `<div class="category-title">🔥 Đang mở</div><div class="de-list">${renderExamCards(openList,"open")}</div>`;
        if(futureList.length) html += `<div class="category-title">📅 Sắp mở</div><div class="de-list">${renderExamCards(futureList,"future")}</div>`;
        if(closedList.length) html += `<div class="category-title">📚 Đã đóng</div><div class="de-list">${renderExamCards(closedList,"closed")}</div>`;
        if(openList.length===0 && futureList.length===0 && closedList.length===0) html = `<div style="text-align:center; padding:40px;">📭 Không có đề phù hợp.</div>`;
        container.innerHTML = html;
    }

    function renderExamCards(exams, status) {
        return exams.map(ex => {
            let extraClass="", btnText="✍️ Làm bài", disabled=false;
            if(status==="future"){ extraClass="future-card"; btnText="⏳ Sắp mở"; disabled=true; }
            if(status==="closed"){ extraClass="closed-card"; btnText="🔒 Đã đóng"; disabled=true; }
            let btnClass=disabled?"btn btn-disabled":"btn";
            let submits=getSubmits(ex.html);
            let noLimitBadge = (ex.timeLimited===false) ? '<span class="no-time-badge">♾️ Không giới hạn</span>' : '';
            return `
                <div class="de-card ${extraClass}">
                    <h3>📄 ${ex.title} ${noLimitBadge}</h3>
                    <div class="de-meta">${ex.timeLimited!==false ? `📅 ${ex.open} → ${ex.close}` : '⏰ Luôn mở'}</div>
                    <div class="de-meta">🏫 Lớp ${ex.grade} | Tuần ${ex.week||''}</div>
                    <div class="luot-lam">📊 Lượt nộp: ${submits}</div>
                    <a href="${disabled?"#":ex.html}" class="${btnClass}">${btnText}</a>
                </div>
            `;
        }).join("");
    }

    // ========== RENDER TÀI LIỆU (mobile-friendly: không iframe) ==========
    function renderTaiLieu() {
        let container = document.getElementById("content");
        if(!allDocs.length) {
            container.innerHTML = `<div style="text-align:center; padding:40px;">📭 Chưa có tài liệu nào.</div>`;
            return;
        }
        // Lọc theo lớp được bật
        let enabled = loadGradeVisibility();
        let docs = allDocs.filter(doc => {
            if(!doc.grade) return true;
            return enabled[doc.grade] === true;
        });
        if(docs.length===0){
            container.innerHTML = `<div style="text-align:center; padding:40px;">📭 Không có tài liệu phù hợp.</div>`;
            return;
        }
        let html = `<div class="category-title">📚 Tài liệu học tập</div><div class="doc-list">`;
        docs.forEach(doc => {
            let fileExt = doc.type || (doc.file.split('.').pop().toLowerCase());
            let isPdf = fileExt === 'pdf';
            // Nút xem: mở file trực tiếp trong tab mới (trình duyệt xử lý)
            let viewBtn = isPdf ? `<a href="${doc.file}" target="_blank" class="btn btn-view">📖 Xem</a>` : '';
            html += `
                <div class="doc-card">
                    <h3>📘 ${escapeHtml(doc.title)}</h3>
                    <p style="color:#555; margin:8px 0;">${escapeHtml(doc.description || '')}</p>
                    <div class="de-meta">📁 ${doc.file} ${doc.grade ? `| Lớp ${doc.grade}` : ''}</div>
                    <div class="doc-actions">
                        <a href="${doc.file}" download class="btn btn-download">⬇️ Tải về</a>
                        ${viewBtn}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    // Hàm phòng chống XSS (dù dữ liệu an toàn)
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // ========== KHỞI TẠO ==========
    async function init() {
        filterCategories();
        await Promise.all([loadExams(), loadDocs()]);
        currentTab = "de";
        renderMenus();
        renderDeThi();
    }

    document.getElementById("menuToggle").onclick = () => {
        let menu = document.getElementById("mobileMenuList");
        menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    };

    init();
</script>
</body>
</html>
